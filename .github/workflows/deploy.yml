# Build → migrate → deploy (no traffic) → smoke-test → promote.
# Migrations run on every deploy and a DB/page smoke test must pass before the
# new revision receives production traffic — a deploy can never put live code in
# front of an un-migrated or unreachable database (SPEC §12). Parameterized so
# the same workflow deploys any GCP project (SPEC §13).
#
# Required repo/environment VARIABLES:
#   GCP_PROJECT_ID, GCP_REGION, GCP_ARTIFACT_REPO (e.g. "calyflow"),
#   CLOUD_RUN_SERVICE (e.g. "calyflow-app"),
#   GCP_WIF_PROVIDER (projects/N/locations/global/workloadIdentityPools/...),
#   GCP_SERVICE_ACCOUNT (deployer SA email),
#   SINGLE_WORKSPACE, ADMIN_EMAILS,
#   PLATFORM_PROVIDER_ENABLED, CALYFLOW_PLATFORM_PROVIDER,
#   CALYFLOW_PLATFORM_MODEL,
#   ONE_TIME_PLATFORM_CREDIT_DEFAULT_USD, MOCK_AI,
#   APP_BASE_URL (public app URL, for connector OAuth redirects)
# Required "Prod" environment SECRETS:
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, NEXT_PUBLIC_SUPABASE_ANON_KEY,
#   APP_ENCRYPTION_KEY, NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY, CLERK_SECRET_KEY,
#   CLERK_WEBHOOK_SIGNING_SECRET, CALYFLOW_PLATFORM_API_KEY, CRON_SECRET,
#   SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD  (CI applies migrations on every
#     deploy; without these the deploy fails closed before any traffic cutover)
# Optional feature SECRETS:
#   FIRECRAWL_API_KEY (enables client "import from domain"),
#   HUNTER_API_KEY (optional contact enrichment for domain import)
# Optional connector OAuth SECRETS (each enables one connector's Connect flow):
#   AIRTABLE_CLIENT_ID, AIRTABLE_CLIENT_SECRET,
#   BULLHORN_CLIENT_ID, BULLHORN_CLIENT_SECRET,
#   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
#   JOBADDER_CLIENT_ID, JOBADDER_CLIENT_SECRET,
#   MICROSOFT_CLIENT_ID, MICROSOFT_CLIENT_SECRET,
#   NOTION_CLIENT_ID, NOTION_CLIENT_SECRET,
#   ZOHO_CLIENT_ID, ZOHO_CLIENT_SECRET
# Optional connector VARIABLES (regional base-URL overrides; code has defaults):
#   BULLHORN_AUTH_BASE, BULLHORN_REST_LOGIN_BASE,
#   ZOHO_ACCOUNTS_BASE, ZOHO_API_BASE, ZOHO_RECRUIT_API_BASE

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Workload Identity Federation — no SA keys in secrets

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  # Quality gate before anything credentialed runs: lint, typecheck, and the
  # vitest suite. Needs no secrets — tests stub their own env.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  build-and-deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment: Prod
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPO }}/${{ vars.CLOUD_RUN_SERVICE }}:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build container
        run: |
          docker build -t "$IMAGE" \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --build-arg CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}" \
            --build-arg SINGLE_WORKSPACE="${{ vars.SINGLE_WORKSPACE }}" \
            .

      - name: Push container
        run: docker push "$IMAGE"

      # Migrations are a MANDATORY part of every deploy: the new image must never
      # go live against a DB that hasn't had its migrations applied (that exact
      # gap took prod down once). Requires the two secrets below — without them
      # the deploy fails closed here, BEFORE any traffic is cut over.
      - name: Require migration credentials
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Migrations can't run: set SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD in the Prod environment. Refusing to deploy code against an un-migrated database."
            exit 1
          fi

      # Pin to the CLI version the repo's supabase/config.toml targets — an
      # older default rejects newer config keys (oauth_server, web3, s3_protocol,
      # db.migrations.enabled, …). Bump this alongside local CLI upgrades.
      - uses: supabase/setup-cli@v1
        with:
          version: 2.105.0

      - name: Apply Supabase migrations (also verifies DB connectivity)
        run: |
          set -euo pipefail
          PROJECT_REF="$(echo "$SUPABASE_URL" | sed -E 's#https://([^.]+)\.supabase\.co.*#\1#')"
          supabase link --project-ref "$PROJECT_REF"
          # db push opens a real connection to the prod DB and applies every
          # pending migration. A connection or migration failure exits non-zero
          # and fails the job → no Cloud Run deploy happens.
          supabase db push --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Seed library workflows & model catalog
        run: |
          npm ci
          npx tsx scripts/seed.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # JSON is valid YAML, and JSON.stringify handles quoting/escaping —
      # values like comma-separated ADMIN_EMAILS would break --set-env-vars.
      - name: Render Cloud Run env file
        run: |
          node -e '
            const keys = [
              "SUPABASE_URL", "SUPABASE_SERVICE_ROLE_KEY",
              "NEXT_PUBLIC_SUPABASE_ANON_KEY", "APP_ENCRYPTION_KEY",
              "SINGLE_WORKSPACE", "ADMIN_EMAILS",
              "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY", "CLERK_SECRET_KEY",
              "CLERK_WEBHOOK_SIGNING_SECRET", "PLATFORM_PROVIDER_ENABLED",
              "CALYFLOW_PLATFORM_API_KEY", "CALYFLOW_PLATFORM_PROVIDER",
              "CALYFLOW_PLATFORM_MODEL",
              "ONE_TIME_PLATFORM_CREDIT_DEFAULT_USD", "CRON_SECRET", "MOCK_AI",
              "FIRECRAWL_API_KEY", "HUNTER_API_KEY",
              "APP_BASE_URL", "AIRTABLE_CLIENT_ID", "AIRTABLE_CLIENT_SECRET",
              "BULLHORN_CLIENT_ID", "BULLHORN_CLIENT_SECRET",
              "BULLHORN_AUTH_BASE", "BULLHORN_REST_LOGIN_BASE",
              "GOOGLE_CLIENT_ID", "GOOGLE_CLIENT_SECRET",
              "JOBADDER_CLIENT_ID", "JOBADDER_CLIENT_SECRET",
              "MICROSOFT_CLIENT_ID", "MICROSOFT_CLIENT_SECRET",
              "NOTION_CLIENT_ID", "NOTION_CLIENT_SECRET",
              "ZOHO_CLIENT_ID", "ZOHO_CLIENT_SECRET",
              "ZOHO_ACCOUNTS_BASE", "ZOHO_API_BASE", "ZOHO_RECRUIT_API_BASE",
            ];
            const env = Object.fromEntries(
              keys.filter((k) => process.env[k]).map((k) => [k, process.env[k]])
            );
            require("fs").writeFileSync("runtime-env.yaml", JSON.stringify(env));
          '
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          APP_ENCRYPTION_KEY: ${{ secrets.APP_ENCRYPTION_KEY }}
          SINGLE_WORKSPACE: ${{ vars.SINGLE_WORKSPACE }}
          ADMIN_EMAILS: ${{ vars.ADMIN_EMAILS }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_WEBHOOK_SIGNING_SECRET: ${{ secrets.CLERK_WEBHOOK_SIGNING_SECRET }}
          PLATFORM_PROVIDER_ENABLED: ${{ vars.PLATFORM_PROVIDER_ENABLED }}
          CALYFLOW_PLATFORM_API_KEY: ${{ secrets.CALYFLOW_PLATFORM_API_KEY }}
          CALYFLOW_PLATFORM_PROVIDER: ${{ vars.CALYFLOW_PLATFORM_PROVIDER }}
          CALYFLOW_PLATFORM_MODEL: ${{ vars.CALYFLOW_PLATFORM_MODEL }}
          ONE_TIME_PLATFORM_CREDIT_DEFAULT_USD: ${{ vars.ONE_TIME_PLATFORM_CREDIT_DEFAULT_USD }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          MOCK_AI: ${{ vars.MOCK_AI }}
          # Client "import from domain" researcher. FIRECRAWL_API_KEY enables
          # the feature; HUNTER_API_KEY (optional) adds contact enrichment.
          # Unset values are filtered out above, so the import option just
          # stays hidden until FIRECRAWL_API_KEY is provided.
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          # OAuth connectors. APP_BASE_URL is the public app URL
          # (e.g. https://app.calyflow.com); each provider's registered redirect
          # URI must be ${APP_BASE_URL}/api/connectors/<provider>/callback.
          # Unset values are filtered out above — a connector without
          # credentials just shows "not configured" on its Connect button.
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          AIRTABLE_CLIENT_ID: ${{ secrets.AIRTABLE_CLIENT_ID }}
          AIRTABLE_CLIENT_SECRET: ${{ secrets.AIRTABLE_CLIENT_SECRET }}
          BULLHORN_CLIENT_ID: ${{ secrets.BULLHORN_CLIENT_ID }}
          BULLHORN_CLIENT_SECRET: ${{ secrets.BULLHORN_CLIENT_SECRET }}
          BULLHORN_AUTH_BASE: ${{ vars.BULLHORN_AUTH_BASE }}
          BULLHORN_REST_LOGIN_BASE: ${{ vars.BULLHORN_REST_LOGIN_BASE }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          JOBADDER_CLIENT_ID: ${{ secrets.JOBADDER_CLIENT_ID }}
          JOBADDER_CLIENT_SECRET: ${{ secrets.JOBADDER_CLIENT_SECRET }}
          MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
          MICROSOFT_CLIENT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
          NOTION_CLIENT_ID: ${{ secrets.NOTION_CLIENT_ID }}
          NOTION_CLIENT_SECRET: ${{ secrets.NOTION_CLIENT_SECRET }}
          ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_ACCOUNTS_BASE: ${{ vars.ZOHO_ACCOUNTS_BASE }}
          ZOHO_API_BASE: ${{ vars.ZOHO_API_BASE }}
          ZOHO_RECRUIT_API_BASE: ${{ vars.ZOHO_RECRUIT_API_BASE }}

      # Deploy the new revision but DON'T send it production traffic yet
      # (--no-traffic). The tagged URL lets us smoke-test the real revision in
      # isolation; only a healthy revision gets promoted below.
      - name: Deploy new revision (no traffic)
        run: |
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --image "$IMAGE" \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --env-vars-file runtime-env.yaml \
            --timeout 3600 \
            --no-traffic \
            --tag candidate

      # Hit the candidate revision directly: the app must boot (/sign-in) AND be
      # able to reach + query the DB (/api/health). If either fails, the job
      # fails here and production traffic stays on the previous good revision.
      - name: Smoke-test candidate revision
        run: |
          set -euo pipefail
          CANDIDATE_URL="$(gcloud run services describe "${{ vars.CLOUD_RUN_SERVICE }}" \
            --region "${{ vars.GCP_REGION }}" --project "${{ vars.GCP_PROJECT_ID }}" \
            --format=json | jq -r '.status.traffic[] | select(.tag=="candidate") | .url')"
          if [ -z "$CANDIDATE_URL" ] || [ "$CANDIDATE_URL" = "null" ]; then
            echo "::error::Could not resolve the candidate revision URL"; exit 1
          fi
          echo "Smoke-testing $CANDIDATE_URL"
          curl -fsS --retry 6 --retry-all-errors --retry-delay 5 \
            -o /dev/null -w "sign-in: HTTP %{http_code}\n" "$CANDIDATE_URL/sign-in"
          curl -fsS --retry 6 --retry-all-errors --retry-delay 5 \
            -o /dev/null -w "health:  HTTP %{http_code}\n" "$CANDIDATE_URL/api/health"

      - name: Promote candidate to production traffic
        run: |
          gcloud run services update-traffic "${{ vars.CLOUD_RUN_SERVICE }}" \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --to-latest

      - name: Cleanup env file
        if: always()
        run: rm -f runtime-env.yaml
