# Build → Artifact Registry → Cloud Run, with Supabase migrations as a
# pipeline step (SPEC §12). Parameterized so the same workflow deploys any
# GCP project (SPEC §13).
#
# Required repo/environment VARIABLES:
#   GCP_PROJECT_ID, GCP_REGION, GCP_ARTIFACT_REPO (e.g. "calyflow"),
#   CLOUD_RUN_SERVICE (e.g. "calyflow-app"),
#   GCP_WIF_PROVIDER (projects/N/locations/global/workloadIdentityPools/...),
#   GCP_SERVICE_ACCOUNT (deployer SA email),
#   SINGLE_WORKSPACE, ADMIN_EMAILS,
#   PLATFORM_PROVIDER_ENABLED, CALYFLOW_PLATFORM_PROVIDER,
#   CALYFLOW_PLATFORM_MODEL,
#   ONE_TIME_PLATFORM_CREDIT_DEFAULT_USD, MOCK_AI
# Required "Prod" environment SECRETS:
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, NEXT_PUBLIC_SUPABASE_ANON_KEY,
#   APP_ENCRYPTION_KEY, NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY, CLERK_SECRET_KEY,
#   CLERK_WEBHOOK_SIGNING_SECRET, CALYFLOW_PLATFORM_API_KEY, CRON_SECRET
# Optional SECRETS (enable CI-applied DB migrations):
#   SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Workload Identity Federation — no SA keys in secrets

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Prod
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPO }}/${{ vars.CLOUD_RUN_SERVICE }}:${{ github.sha }}
      # secrets.* is not allowed in step `if:` — surface the toggle via env
      CI_MIGRATIONS_ENABLED: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build container
        run: |
          docker build -t "$IMAGE" \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --build-arg CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}" \
            --build-arg SINGLE_WORKSPACE="${{ vars.SINGLE_WORKSPACE }}" \
            .

      - name: Push container
        run: docker push "$IMAGE"

      # Migrations are applied via the Supabase MCP/dashboard today. Add the
      # SUPABASE_ACCESS_TOKEN + SUPABASE_DB_PASSWORD secrets to have CI apply
      # supabase/migrations on every deploy instead.
      - uses: supabase/setup-cli@v1
        if: env.CI_MIGRATIONS_ENABLED == 'true'
      - name: Apply Supabase migrations
        if: env.CI_MIGRATIONS_ENABLED == 'true'
        run: |
          PROJECT_REF="$(echo "$SUPABASE_URL" | sed -E 's#https://([^.]+)\.supabase\.co.*#\1#')"
          supabase link --project-ref "$PROJECT_REF"
          supabase db push --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Seed library workflows & model catalog
        run: |
          npm ci
          npx tsx scripts/seed.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # JSON is valid YAML, and JSON.stringify handles quoting/escaping —
      # values like comma-separated ADMIN_EMAILS would break --set-env-vars.
      - name: Render Cloud Run env file
        run: |
          node -e '
            const keys = [
              "SUPABASE_URL", "SUPABASE_SERVICE_ROLE_KEY",
              "NEXT_PUBLIC_SUPABASE_ANON_KEY", "APP_ENCRYPTION_KEY",
              "SINGLE_WORKSPACE", "ADMIN_EMAILS",
              "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY", "CLERK_SECRET_KEY",
              "CLERK_WEBHOOK_SIGNING_SECRET", "PLATFORM_PROVIDER_ENABLED",
              "CALYFLOW_PLATFORM_API_KEY", "CALYFLOW_PLATFORM_PROVIDER",
              "CALYFLOW_PLATFORM_MODEL",
              "ONE_TIME_PLATFORM_CREDIT_DEFAULT_USD", "CRON_SECRET", "MOCK_AI",
            ];
            const env = Object.fromEntries(
              keys.filter((k) => process.env[k]).map((k) => [k, process.env[k]])
            );
            require("fs").writeFileSync("runtime-env.yaml", JSON.stringify(env));
          '
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          APP_ENCRYPTION_KEY: ${{ secrets.APP_ENCRYPTION_KEY }}
          SINGLE_WORKSPACE: ${{ vars.SINGLE_WORKSPACE }}
          ADMIN_EMAILS: ${{ vars.ADMIN_EMAILS }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_WEBHOOK_SIGNING_SECRET: ${{ secrets.CLERK_WEBHOOK_SIGNING_SECRET }}
          PLATFORM_PROVIDER_ENABLED: ${{ vars.PLATFORM_PROVIDER_ENABLED }}
          CALYFLOW_PLATFORM_API_KEY: ${{ secrets.CALYFLOW_PLATFORM_API_KEY }}
          CALYFLOW_PLATFORM_PROVIDER: ${{ vars.CALYFLOW_PLATFORM_PROVIDER }}
          CALYFLOW_PLATFORM_MODEL: ${{ vars.CALYFLOW_PLATFORM_MODEL }}
          ONE_TIME_PLATFORM_CREDIT_DEFAULT_USD: ${{ vars.ONE_TIME_PLATFORM_CREDIT_DEFAULT_USD }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          MOCK_AI: ${{ vars.MOCK_AI }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --image "$IMAGE" \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --env-vars-file runtime-env.yaml \
            --timeout 3600

      - name: Cleanup env file
        if: always()
        run: rm -f runtime-env.yaml
