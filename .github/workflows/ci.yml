name: CI

# Runs on PRs only — pushes to main are gated by the Deploy workflow's
# docker build, so a second CI run there would be redundant.
on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
