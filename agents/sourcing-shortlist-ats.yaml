long_description: |
  ## What it does
  The Sourcing Shortlist agent reads the role's brief from your project, pulls
  candidates from your connected applicant tracking system, ranks them against
  the requirements, and writes a shortlist back into the project.

  ## Why recruiters use it
  - Get a first-pass shortlist in minutes instead of clicking through your ATS
    by hand.
  - Rank candidates against the actual role, with the reasoning shown.
  - Works with whatever ATS your agency already runs — no switching tools.

  ## Connect your ATS
  Pick any one of your connected ATS connectors when you run it, including:
  - Greenhouse, Lever, Workable, Ashby
  - Bullhorn, JobAdder, Loxo, Recruiterflow
  - Teamtailor, SmartRecruiters, Recruitee, and more

  ## What you get
  A ranked shortlist document with a one-line rationale for each candidate and
  a note on who was ruled out and why.

  ## How to run it
  Open a project with a role brief, choose your ATS, describe what you want,
  and run. The shortlist is saved to your project files.
