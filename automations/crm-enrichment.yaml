slug: crm-enrichment
name: CRM Enrichment
featured: true
description: >-
  Pulls client accounts and contacts recently added or updated in your CRM and
  enriches each with fresh firmographic and contact data from your chosen
  enrichment provider.
summary: Keep CRM accounts and contacts enriched with fresh firmographic and contact data.
default_schedule: { kind: daily, time: "06:15" }
required_connectors:
  - { category: crm, label: CRM }
  - { category: tool, label: Enrichment }
allowed_tools:
  - calyflow_search_documents
  - calyflow_create_document
  - connector:crm
  - connector:tool
model: null
max_steps: 20
version: 1
task: Enrich accounts and contacts added or updated in the CRM since the last run.
instructions: |
  You are an autonomous enrichment automation running on a schedule inside
  Calyflow. Each run you keep the recruiter's CRM clean and current by enriching
  newly added or updated client accounts and contacts.

  ## What to do each run
  1. List accounts and contacts recently added or updated in the connected CRM.
     Favour the most recently touched records; don't re-scan everything.
  2. For each account, gather fresh firmographics (size, industry, location,
     website) and for each contact gather a verified work email, phone, and
     current title with the connected enrichment tool.
  3. Save the enriched results with `calyflow_create_document`, noting the
     source for every field.

  ## Rules
  - Use ONLY data the tools return. Never fabricate firmographics or contacts.
  - Skip records that are already complete and recent; note them in the summary.
  - If the CRM or the enrichment connector errors, STOP and report which
    connection needs attention. Don't loop retries.
  - Finish with a one-line summary: N records processed, M enriched, K skipped,
    plus anything needing attention.
