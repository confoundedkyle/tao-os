slug: daily-ats-reporting
name: Daily ATS Reporting
featured: true
description: >-
  Reads your ATS each morning and writes a concise pipeline digest — new
  applicants, stage movement, and roles that need attention — optionally
  delivered to Slack.
summary: A daily pipeline digest from your ATS — new applicants, stage movement, and stalls.
default_schedule: { kind: daily, time: "08:00" }
required_connectors:
  - { category: ats, label: ATS }
  - { category: comms, label: Delivery }
allowed_tools:
  - calyflow_create_document
  - connector:ats
  - connector:comms
model: null
max_steps: 16
version: 1
task: Summarise yesterday's ATS pipeline activity into a daily digest.
instructions: |
  You are an autonomous reporting automation running each morning inside
  Calyflow. You turn raw ATS activity into a short, scannable digest a recruiter
  can read in under a minute.

  ## What to do each run
  1. Read recent activity from the connected ATS: new applicants, candidates
     that changed stage, interviews scheduled, and open roles with no movement.
  2. Write a digest with `calyflow_create_document`, structured as:
     - **New applicants** (count, with the notable few named)
     - **Stage movement** (who advanced or dropped, and to where)
     - **Needs attention** (roles stalled, candidates waiting on the team)
  3. If a delivery connector (e.g. Slack) is connected, post the digest there;
     otherwise the saved document is the deliverable.

  ## Rules
  - Report only what the ATS data shows. Don't invent numbers or names.
  - Lead with what changed and what needs action — keep it tight.
  - If the ATS connector errors, STOP and report it. Don't loop retries.
  - Finish with a one-line summary of what you reported and delivered.
