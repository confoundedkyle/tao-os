name: Candidate ICP Builder
description: >-
  Turn the project's job description into a structured Ideal Candidate Profile
  with a weighted scoring rubric — must-have (3), important (2) and
  nice-to-have (1) criteria, each with a concrete "how to evaluate" cue, plus a
