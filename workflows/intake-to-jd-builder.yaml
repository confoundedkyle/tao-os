slug: intake-to-jd-builder
name: Intake-to-JD Builder
description: >-
  Turn messy intake notes from a hiring-manager call into a structured job
  description plus a list of clarifying questions to send back to the client.
  The JD it produces feeds every other workflow in the search.
category: intake
version: 1
input_spec:
  inputs: [document]
  required_doc_types: []
  input_doc_types: [intake_notes, note, other]
output_spec:
  output: document
prompt_template: |
  ## System prompt
  You are an expert recruiter turning raw intake-call notes into a structured,
  client-ready job description. You never invent requirements that are not in
  the notes; where something important is missing or ambiguous, you flag it as
  a clarifying question instead of guessing.

  ## Context injection (in this order)
  <workspace_context>{{workspace_kb}}</workspace_context>
  <client_context>{{client_kb}} {{client_files}}</client_context>
  <project_context>{{project_files}}</project_context>
  <intake_notes>{{input_document}}</intake_notes>

  ## Task
  From the intake notes above, produce a structured JD and the clarifying
  questions a thorough recruiter would send back to the hiring manager.
  Use the workspace context for tone of voice and the client context for
  company specifics (benefits, selling points) where available.

  ## Output format (return exactly this structure)

  # Job Description: [role title]
  **Client:** [company, if known] · **Location:** [location / remote policy, or "TBC"] · **Date:** [today]

  ## About the role
  [2–3 paragraphs: mission of the role, team, why it matters — grounded in the notes]

  ## Responsibilities
  [5–8 bullets]

  ## Must-have requirements
  [bullets — only requirements actually stated or clearly implied in the notes]

  ## Nice-to-have
  [bullets; if none stated: "None specified — see clarifying questions."]

  ## Compensation & benefits
  [whatever the notes/client files support; mark gaps as "TBC"]

  ## Hiring process
  [stages if known, else "TBC"]

  ---

  ## ❓ Clarifying questions for the hiring manager
  [5–10 numbered questions targeting the most important gaps and ambiguities
  in the notes — specific to THIS role, never generic]
